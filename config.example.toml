# QQ Bot 配置示例文件
# 复制为 config.toml 并按需修改。
# 优先级：TOML < 环境变量 < CLI 参数

# 私聊白名单，只接受这些用户的私聊。空数组 = 不限制
# allowed_private_users = [10001, 10002]
allowed_private_users = []

# ---------------------------------------------------------------------------
# 管理员（QQ号 → 昵称）
# 注入系统提示词（记忆中视为可信来源）+ 授权群管理工具（禁言、头衔等）
# ---------------------------------------------------------------------------
[admins]
# "123456789" = "管理员昵称"

# ---------------------------------------------------------------------------
# LLM 接入
# ---------------------------------------------------------------------------
[llm]
# Anthropic 兼容 API 地址
# 环境变量: LLM_BASE_URL | CLI: --llm-base-url
base_url = "http://127.0.0.1:34567/v1"

# API 密钥
# 环境变量: LLM_API_KEY | CLI: --llm-api-key
api_key = "sk-placeholder"

# 模型名称
# 环境变量: LLM_MODEL | CLI: --llm-model
model = "claude-sonnet-4-6"

# 单次回复最大 token 数
max_tokens = 1024

# ---------------------------------------------------------------------------
# 上下文窗口
# ---------------------------------------------------------------------------
[llm.context]
# 上下文窗口大小（token 数），超出后触发 compact
max_context_tokens = 1_000_000

# ---------------------------------------------------------------------------
# LLM 用量追踪
# ---------------------------------------------------------------------------
[llm.usage]
# 是否启用用量记录
enabled = true
# 单次调用耗时告警阈值（秒）
slow_threshold_s = 60.0

# ---------------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------------
[log]
dir = "storage/logs"

# 日志频道开关（仅影响 stderr 输出，不影响文件日志）
[log.channels]
message_in = false
message_out = false
thinking = false
mood = false
affection = false
schedule = false
scheduler = false
usage = false
compact = false
reply_workflow = false

# ---------------------------------------------------------------------------
# 人设与指令（soul 目录）
# ---------------------------------------------------------------------------
[soul]
# 存放 identity.md 和 instruction.md 的目录
dir = "soul"

# ---------------------------------------------------------------------------
# 上下文压缩
# ---------------------------------------------------------------------------
[compact]
# compact 触发比例（input_tokens 占 max_context_tokens 的比例）
ratio = 0.7
# 每次压缩前多少比例的消息（0.5 = 前 50%）
compress_ratio = 0.5
# 连续压缩失败上限，超过后跳过
max_failures = 3
# cache_hit 低于此百分比时告警（窗口内平均值）
cache_hit_warn = 90.0
# 计算平均 cache hit rate 的时间窗口（分钟）
cache_alert_window_m = 30.0
# 两次 cache 告警间最短间隔（分钟）
cache_alert_cooldown_m = 10.0

# ---------------------------------------------------------------------------
# 群聊
# ---------------------------------------------------------------------------
[group]
# 启动时从 NapCat 拉取的历史消息条数
history_load_count = 30

# Legacy 兼容字段：旧配置里填过的群会保持 active 发言，避免迁移后突然静默。
# 新装与日常维护请改用 /admin/groups 页面，它会写入独立文件：
#   config/group-policy.json
# 规则：whitelist=白名单群开启，其余关闭；blacklist=黑名单群关闭，其余开启。
# allowed_groups = [100001, 100002]
allowed_groups = []

# 非@消息的回复概率 (0-1)。@消息始终回复。0 = 完全沉默，1 = 每条都回
talk_value = 0.3

# 两次聊天之间的最小间隔（秒），防止刷屏
planner_smooth = 3.0

# 非@消息的 debounce 等待时间（秒），等消息间隙后触发模型调用
debounce_seconds = 5.0

# 最多攒多少条消息强制触发模型调用
batch_size = 10

# 仅@模式：开启后只在被@时回复，不主动插话
at_only = false

# 全局屏蔽用户列表（所有群生效）
blocked_users = []

# 群聊隐私遮掩（发言人 QQ 号脱敏为 "某群友"）
privacy_mask = true

# 新群默认静默学习：只记录和学习黑话，不主动/被动回复。
# 如需让某个群发言，在管理端群 Profile 里把“参与模式”改为 active；
# 或在配置 JSON/TOML 中设置 group.overrides.<群号>.presence_mode = "active"。
#
# [group.presence]
# default_mode = "silent_learn"  # active / silent_learn / off
#
# [group.overrides.100001]
# presence_mode = "active"
#
# 独立门禁文件 config/group-policy.json:
# {
#   "mode": "whitelist",
#   "whitelist": [100001],
#   "blacklist": [],
#   "log_dropped": true
# }

# ---------------------------------------------------------------------------
# 回复分段
# 控制可见回复如何切段与逐段发送；不影响知识库 chunking
# ---------------------------------------------------------------------------
[reply_segmentation]
enabled = true
max_segment_chars = 20
min_segment_chars = 6
# 0 = 不限制正常分段数量；仅在需要防极端刷屏时设为正数
max_send_segments = 0
# 极端长回复软上限：超过后截断并补自然收尾；0 = 默认关闭软上限
soft_max_send_segments = 0
soft_limit_notice = "先说到这里啦，不然我要刷屏了☆"
# pysbd_hybrid = pySBD 候选句边界 + Omubot 聊天节奏；local = 本地规则回退
boundary_backend = "pysbd_hybrid"
prefer_sentence_break = true
preserve_ascii_tokens = true
merge_short_tail = true
first_segment_humanize = "skip"
later_segment_humanize = "normal"
inter_segment_delay_s = 0.8

# ---------------------------------------------------------------------------
# 回复工作流观测
# shadow 只记录观测日志；semantic 使用小模型 gate；off 关闭观测。
# 旧值 rules 会被兼容读取为 shadow，不再消费真实行为。
# ---------------------------------------------------------------------------
[reply_workflow]
# shadow = 记录观测日志；semantic = 高置信语义承接转 directed_followup；off = 关闭观测。
mode = "shadow"
# semantic 模式下，小模型返回 force_reply 且置信度不低于该值才会强触发
semantic_force_threshold = 0.78
# semantic gate 单次调用超时毫秒数；超时 fail closed。DeepSeek 线上首字节常超过 600ms。
semantic_timeout_ms = 2200
# 进入 semantic gate 的当前消息最大字符数
semantic_max_chars = 48
# 承接类短句判断最近 bot 回复的时间窗口（秒）
directed_followup_window_s = 180.0
# 是否记录私聊当前直进 LLM 路径的观测日志
shadow_log_private = true

# ---------------------------------------------------------------------------
# 群聊调度并发
# ---------------------------------------------------------------------------
[scheduler.concurrency]
# 全局同时进行的群聊 LLM 调用数。建议 2 起步，稳定后再调高。
global_llm_limit = 2
# 预留：单群队列软上限。当前保守实现仅暴露配置，后续 actor 化时启用。
max_group_queue = 8
# 预留：低优先级队列软上限。
max_low_priority_queue = 3
# 实验项：首段发送后释放下一轮生成。当前默认关闭，避免贴纸/文字顺序交错。
first_segment_release = false
# 预留：低优先级事件过期时间。
drop_stale_low_priority_after_s = 45.0

# ---------------------------------------------------------------------------
# 群聊单群覆盖（可选）
# 未填的参数自动使用上方全局值，blocked_users 取并集
# ---------------------------------------------------------------------------
# [group.overrides.100001]
# blocked_users = [123456, 789012]
# at_only = true
# talk_value = 0.5
# planner_smooth = 5.0
# debounce_seconds = 10.0
# batch_size = 20
# history_load_count = 50
# privacy_mask = false

# ---------------------------------------------------------------------------
# NapCat HTTP API
# ---------------------------------------------------------------------------
[napcat]
# NapCat HTTP API 地址
# 环境变量: NAPCAT_API_URL
api_url = "http://localhost:29300"

# ---------------------------------------------------------------------------
# 多模态视觉（图片理解）
# ---------------------------------------------------------------------------
[vision]
# 总开关，关闭后所有图片降级为 [图片] 文字
enabled = true
# 单条消息最多处理的图片数，超出的用 [图片] 代替
max_images_per_message = 5
# 图片缩放最大边像素
max_dimension = 768
# 图片缓存目录
cache_dir = "storage/image_cache"
# 缓存过期时间（小时）
cache_max_age_hours = 24

[vision.qwen]
# 填写 api_key 即启用图像描述（通过 Qwen VL 模型），留空则关闭
# 环境变量: QWEN_VL_API_KEY, QWEN_VL_BASE_URL, QWEN_VL_MODEL
api_key = ""
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen2.5-vl-7b-instruct"

# ---------------------------------------------------------------------------
# Admin 面板
# ---------------------------------------------------------------------------
# 登录 Token
# 环境变量: ADMIN_TOKEN
admin_token = ""
