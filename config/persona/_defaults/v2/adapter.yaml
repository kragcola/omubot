schema: omubot.adapter.v2
version: 2.1.0-proposal

platform:
  kind: onebot_v11
  adapter: napcat

bot_identity:
  runtime_source: adapter_connect_event
  self_id_hint: ""
  known_self_ids: []
  prompt_policy:
    assistant_role_only: true
    user_role_nickname_untrusted: true
    qq_id_is_identity_key: true

events:
  message_received: true
  recall_received: true
  send_receipt: true

send:
  max_segments: 4
  segment_delay_seconds: 0.8
  humanizer: inherit
  reply_prefix_for_at: true

permissions:
  admin_required_for_freeze: true
  source: source_front_matter
  admins: []
